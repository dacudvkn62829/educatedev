<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dummy LMS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      width: 90%;
      max-width: 1000px;
      margin: 30px auto;
    }
    .course {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dummy LMS Platform</h1>
    <p>Simple Learning Management System Demo</p>
  </header>

  <div class="container">
    <div class="course">
      <h2>Python Basics</h2>
      <p>Learn Python fundamentals for beginners.</p>
      <button>Start Course</button>
    </div>

    <div class="course">
      <h2>HTML & CSS</h2>
      <p>Build responsive websites from scratch.</p>
      <button>Start Course</button>
    </div>

    <div class="course">
      <h2>JavaScript Essentials</h2>
      <p>Understand modern JavaScript concepts.</p>
      <button>Start Course</button>
    </div>
  </div>
</body>
</html>
